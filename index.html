<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERBY PRO 🐎</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <aside>
        <div class="balance-card">
            <h4>SEU SALDO</h4>
            <span id="balance">$100.00</span>
        </div>

        <span class="section-label">1. Escolha o Corredor</span>
        <div class="horse-list">
            <div class="horse-item" data-horse="1">
                <img src="horse_sprite.png" class="h-1">
                <div class="info"><span class="name">Pé de Pano</span><span class="odds">2.0x</span></div>
            </div>
            <div class="horse-item" data-horse="2">
                <img src="horse_sprite.png" class="h-2">
                <div class="info"><span class="name">Ma-Horse</span><span class="odds">2.0x</span></div>
            </div>
            <div class="horse-item" data-horse="3">
                <img src="horse_sprite.png" class="h-3">
                <div class="info"><span class="name">U-Horse-ain</span><span class="odds">2.0x</span></div>
            </div>
            <div class="horse-item" data-horse="4">
                <img src="horse_sprite.png" class="h-4">
                <div class="info"><span class="name">Trota-Mundos</span><span class="odds">2.0x</span></div>
            </div>
            <div class="horse-item" data-horse="5">
                <img src="horse_sprite.png" class="h-5">
                <div class="info"><span class="name">Galope de Ouro</span><span class="odds">2.0x</span></div>
            </div>
        </div>

        <div class="bet-group">
            <span class="section-label">2. Valor da Aposta</span>
            <input type="number" id="bet-amount" placeholder="0.00">
            <button id="place-bet" class="btn bet-btn" disabled>Confirmar Aposta</button>
            <button id="start-race" class="btn start-btn" style="display: none;">Iniciar Corrida!</button>
        </div>
    </aside>

    <main>
        <h1>CORRIDA DE CAVALOS</h1>
        <div class="track-area">
            <div class="finish-line"></div>
            <div class="lane"><img src="horse_sprite.png" id="sprite-1" class="sprite h-1"></div>
            <div class="lane"><img src="horse_sprite.png" id="sprite-2" class="sprite h-2"></div>
            <div class="lane"><img src="horse_sprite.png" id="sprite-3" class="sprite h-3"></div>
            <div class="lane"><img src="horse_sprite.png" id="sprite-4" class="sprite h-4"></div>
            <div class="lane"><img src="horse_sprite.png" id="sprite-5" class="sprite h-5"></div>
        </div>
    </main>

    <audio id="sound-cash" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>
    <audio id="sound-race" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div class="overlay" id="result-overlay">
        <div class="modal">
            <h2 id="modal-title">RESULTADO</h2>
            <p id="modal-message"></p>
            <button class="btn bet-btn" onclick="closeModal()">Nova Rodada</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
